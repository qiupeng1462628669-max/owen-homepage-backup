name: Sync from Website

on:
  workflow_dispatch:  # 允許從外部手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest data from Firebase
        run: |
          # 這裡我們會從你的前端傳資料過來
          echo '${{ github.event.inputs.site_content }}' > site-content.json
          echo '${{ github.event.inputs.blog_posts }}' > blog-posts.json

      - name: Commit and Push
        run: |
          git config user.name "Owen Auto Sync"
          git config user.email "owen@example.com"
          git add site-content.json blog-posts.json
          git commit -m "Auto sync from website - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
