name: Sync from Website

on:
  repository_dispatch:
    types: [sync-from-website]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save data from website
        run: |
          echo '${{ github.event.client_payload.site_content }}' > site-content.json
          echo '${{ github.event.client_payload.blog_posts }}' > blog-posts.json

      - name: Commit and Push
        run: |
          git config user.name "Owen Auto Backup"
          git config user.email "qiupeng1462628669@gmail.com"
          
          git add site-content.json blog-posts.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync from website - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
