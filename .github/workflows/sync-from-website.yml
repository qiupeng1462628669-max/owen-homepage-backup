name: Sync from Website

on:
  repository_dispatch:
    types: [sync-from-website]

# 關鍵：明確給予寫入權限
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true   # 重要：保留憑證

      - name: Save site-content.json
        run: echo '${{ github.event.client_payload.site_content }}' > site-content.json

      - name: Save blog-posts.json
        run: echo '${{ github.event.client_payload.blog_posts }}' > blog-posts.json

      - name: Commit and Push
        run: |
          git config user.name "Owen Auto Backup"
          git config user.email "qiupeng1462628669@gmail.com"
          
          git add site-content.json blog-posts.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync from website - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
